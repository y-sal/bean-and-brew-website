<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to Bean & Brew, the perfect spot for specialty coffee and fresh food.">
    <title>Home - Bean & Brew Café</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Bean and Brew Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="bookings.html">Bookings</a></li>
                <li><a href="deals.html">Deals</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <h1>Welcome to Bean & Brew Café</h1>
            <p>Serving the finest coffee and freshest treats in a warm, cozy atmosphere.</p>
        </section>

        <section class="video-section">
            <div class="video-container">
                <video controls autoplay muted loop>
                    <source src="videos/Bean&Brew.mp4" type="video/mp4">
                </video>
            </div>
        </section>

        <section class="featured-menu-row">
            <div class="featured-grid">
                <figure class="featured-item">
                    <img src="images/latte.jpg" alt="Caffè Latte">
                    <figcaption>
                        <h2>Caffè Latte</h2>
                        <p>Rich espresso balanced with silky steamed milk.</p>
                    </figcaption>
                </figure>

                <figure class="featured-item">
                    <img src="images/avocado.jpg" alt="Avocado Sourdough">
                    <figcaption>
                        <h2>Avocado Sourdough</h2>
                        <p>Crushed avocado, chili flakes, and a poached egg.</p>
                    </figcaption>
                </figure>

                <figure class="featured-item">
                    <img src="images/club.jpg" alt="Classic Club Sandwich">
                    <figcaption>
                        <h2>Classic Club</h2>
                        <p>Toasted layers of turkey, bacon, and fresh greens.</p>
                    </figcaption>
                </figure>

                <figure class="featured-item">
                    <img src="images/fudge-cake.jpg" alt="Chocolate Fudge Cake">
                    <figcaption>
                        <h2>Fudge Cake</h2>
                        <p>A decadent slice of our signature chocolate cake.</p>
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <span>Follow us on:</span>
            <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
            <a href="https://facebook.com" target="_blank" rel="noopener">Facebook</a>
            <a href="https://youtube.com" target="_blank" rel="noopener">YouTube</a>
        </div>
        <div class="contact-info">
            <p>1234 Coffee Street, City Center | Phone: 07123456789</p>
            <p>Opening Hours: Mon-Sun, 7:00 AM - 8:00 PM</p>
        </div>
    </footer>

</body>
</html>
